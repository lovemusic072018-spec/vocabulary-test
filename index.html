            if (e.key === 'Enter') submitAnswer();

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // 1. Scelta dell'unità
        function selectUnit(unitName) {
            if (unitName === 'All') {
                filteredWords = [...database];
                selectedUnitLabel.innerText = "Tutte le unità selezionate";
                document.getElementById('header-subtitle').innerText = "Test globale";
            } else {
                filteredWords = database.filter(word => word.unit === unitName);
                selectedUnitLabel.innerText = `${unitName} selezionata`;
                document.getElementById('header-subtitle').innerText = unitName;
            }
            
            totalWordsCount.innerText = filteredWords.length;
            
            unitScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }

        function goBackToUnits() {
            setupScreen.classList.add('hidden');
            unitScreen.classList.remove('hidden');
            document.getElementById('header-subtitle').innerText = "Seleziona un'unità per iniziare";
        }

        // 2. Avvio del test
        function startTest(numQuestions) {
            selectedLength = numQuestions; // Salvo per il tasto "Ripeti"
            let shuffled = shuffleArray([...filteredWords]);
            
            if (numQuestions === 'all') {
                currentQuiz = shuffled;
            } else {
                currentQuiz = shuffled.slice(0, Math.min(numQuestions, shuffled.length));
            }

            userAnswers = [];
            currentIndex = 0;

            setupScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            loadQuestion();
        }

        function retrySameTest() {
            resultsScreen.classList.add('hidden');
            startTest(selectedLength);
        }

        // 3. Logica del quiz
        function loadQuestion() {
            englishInput.value = '';
            let currentWord = currentQuiz[currentIndex];
            
            questionCounter.innerText = `Domanda ${currentIndex + 1} di ${currentQuiz.length}`;
            let progress = Math.round((currentIndex / currentQuiz.length) * 100);
            progressText.innerText = `${progress}%`;
            progressBar.style.width = `${progress}%`;
            
            italianWord.innerText = currentWord.it;
            englishInput.focus();

            let btn = document.getElementById('submit-btn');
            if (currentIndex === currentQuiz.length - 1) {
                btn.innerHTML = `<span>Correggi il test</span> <i class="fas fa-check"></i>`;
                btn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition-all text-lg flex items-center justify-center gap-2";
            } else {
                btn.innerHTML = `<span>Conferma</span> <i class="fas fa-arrow-right"></i>`;
                btn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition-all text-lg flex items-center justify-center gap-2";
            }
        }

        function cleanString(str) {
            return str.toLowerCase().replace(/[\/]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function submitAnswer() {
            let answer = englishInput.value;
            let correctAnswer = currentQuiz[currentIndex].en;
            
            userAnswers.push({
                question: currentQuiz[currentIndex],
                userAnswer: answer,
                isCorrect: cleanString(answer) === cleanString(correctAnswer)
            });

            currentIndex++;

            if (currentIndex < currentQuiz.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 4. Risultati
        function showResults() {
            quizScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');

            let correctCount = userAnswers.filter(a => a.isCorrect).length;
            let total = currentQuiz.length;
            let percentage = (correctCount / total) * 100;

            finalScoreLabel.innerText = `${correctCount}/${total}`;

            if (percentage === 100) {
                finalScoreLabel.className = "text-5xl font-bold my-4 text-green-600";
                feedbackMessage.innerText = "Ottimo lavoro! Nessun errore.";
                feedbackMessage.className = "text-lg font-medium text-green-700";
            } else if (percentage >= 60) {
                finalScoreLabel.className = "text-5xl font-bold my-4 text-amber-500";
                feedbackMessage.innerText = "Sufficiente, ma controlla le correzioni.";
                feedbackMessage.className = "text-lg font-medium text-amber-600";
            } else {
                finalScoreLabel.className = "text-5xl font-bold my-4 text-red-500";
                feedbackMessage.innerText = "Ci sono diversi errori da rivedere.";
                feedbackMessage.className = "text-lg font-medium text-red-600";
            }

            correctionsList.innerHTML = '';
            
            if(percentage === 100) {
                correctionsList.innerHTML = '<div class="p-4 text-center text-slate-500 font-medium">Hai completato il test senza errori.</div>';
            }

            userAnswers.forEach((item, index) => {
                let div = document.createElement('div');
                
                if (item.isCorrect) {
                    div.className = "correct-answer-card bg-white p-4 rounded-lg shadow-sm border border-slate-100";
                    div.innerHTML = `
                        <p class="font-semibold text-slate-700 mb-1">${index + 1}. ${item.question.it}</p>
                        <p class="text-green-600 text-sm font-semibold"><i class="fas fa-check mr-1"></i> ${item.question.en}</p>
                    `;
                } else {
                    div.className = "wrong-answer-card bg-white p-4 rounded-lg shadow-sm border border-slate-100";
                    let userTyped = item.userAnswer.trim() === "" ? "(Vuoto)" : item.userAnswer;
                    div.innerHTML = `
                        <p class="font-semibold text-slate-700 mb-2">${index + 1}. ${item.question.it}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                            <div class="bg-red-50 p-2 rounded">
                                <span class="text-red-400 text-xs uppercase block mb-1">Tua risposta</span>
                                <span class="text-red-600 line-through">${userTyped}</span>
                            </div>
                            <div class="bg-green-50 p-2 rounded">
                                <span class="text-green-500 text-xs uppercase block mb-1">Corretta</span>
                                <span class="text-green-700 font-bold">${item.question.en}</span>
                            </div>
                        </div>
                    `;
                }
                correctionsList.appendChild(div);
            });
        }
    </script>
