<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Test 📚</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --accent: #9b59b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .app-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Selettori */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            text-align: left;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grid-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .select-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: var(--text-light);
            padding: 12px 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .select-btn:hover {
            background: #e9ecef;
        }

        .select-btn.active {
            background: rgba(52, 152, 219, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .primary-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .primary-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* UI Quiz */
        .progress-container {
            width: 100%;
            background-color: #ecf0f1;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .header-quiz {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .q-counter {
            color: var(--text-light);
            font-weight: 700;
            font-size: 13px;
        }

        .direction-badge {
            background: rgba(155, 89, 182, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .question-box {
            background-color: white;
            border: 2px dashed #bdc3c7;
            border-radius: 16px;
            padding: 25px 20px;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-main);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        /* Risultati */
        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: 700;
            margin: 0 auto 15px auto;
        }

        .vote-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .results-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 25px;
            text-align: left;
            padding-right: 5px;
        }

        .result-item {
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-size: 14px;
            background: #f8f9fa;
            border-left: 5px solid #ccc;
        }

        .result-item.correct { border-left-color: var(--correct); }
        .result-item.wrong { border-left-color: var(--wrong); }

        .result-prompt {
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .result-expected { color: var(--correct); font-weight: 600; }
        .result-err { color: var(--wrong); text-decoration: line-through; margin-right: 8px; font-size: 13px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <h1>Vocabulary Test 📚</h1>
            <p>Seleziona l'unità e la modalità per iniziare l'esercitazione.</p>
            
            <div class="section-title">1. Scegli l'unità</div>
            <div class="grid-selector">
                <button class="select-btn unit-btn" data-unit="unit2" onclick="selectUnit('unit2')">Unit 2: Around Town</button>
                <button class="select-btn unit-btn" data-unit="unit3" onclick="selectUnit('unit3')">Unit 3: Digital Lives</button>
                <button class="select-btn unit-btn" data-unit="unit4" onclick="selectUnit('unit4')">Unit 4: At the Movies</button>
                <button class="select-btn unit-btn" data-unit="unit5" onclick="selectUnit('unit5')">Unit 5: Let's Eat</button>
                <button class="select-btn unit-btn active" data-unit="all" onclick="selectUnit('all')" style="grid-column: span 2;">Tutte le Unità (Mix)</button>
            </div>

            <div class="section-title">2. Scegli la direzione</div>
            <div class="mode-selector">
                <button class="select-btn mode-btn active" data-mode="it-en" onclick="selectMode('it-en')">🇮🇹 Italiano ➔ 🇬🇧 Inglese</button>
                <button class="select-btn mode-btn" data-mode="en-it" onclick="selectMode('en-it')">🇬🇧 Inglese ➔ 🇮🇹 Italiano</button>
                <button class="select-btn mode-btn" data-mode="mixed" onclick="selectMode('mixed')">🔀 Misto (Casuale)</button>
            </div>

            <button class="primary-btn" onclick="startQuiz()">Avvia Test</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div class="header-quiz">
                <div id="question-counter" class="q-counter">Domanda 1/10</div>
                <div id="direction-badge" class="direction-badge">Traduci in 🇬🇧</div>
            </div>
            
            <div id="question-text" class="question-box"></div>
            
            <input type="text" id="answer-input" autocomplete="off">
            
            <button class="primary-btn" onclick="checkAnswer()">Conferma</button>
            <div style="font-size: 12px; color: var(--text-light); margin-top: 12px;">Premi 'Invio' per confermare</div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="screen">
            <h1>Risultati 🎉</h1>
            <div class="score-circle" id="score-display">0/10</div>
            <div id="vote-message" class="vote-text"></div>
            <div class="results-list" id="results-list"></div>
            <button class="primary-btn" onclick="resetQuiz()">Torna alla Home</button>
        </div>

    </div>

    <script>
        // Database dei vocaboli suddiviso per unità
        const db = {
            unit2: [
                { en: "baker's", it: "panetteria" },
                { en: "bank", it: "banca" },
                { en: "bus station", it: "stazione del bus" },
                { en: "bus stop", it: "fermata del bus" },
                { en: "café", it: "caffetteria" },
                { en: "charity shop", it: "caritas" },
                { en: "hairdresser's", it: "negozio di parrucchiere/a" },
                { en: "hospital", it: "ospedale" },
                { en: "newsagent's", it: "edicola" },
                { en: "petrol station", it: "stazione di servizio" },
                { en: "police station", it: "stazione di polizia" },
                { en: "post office", it: "ufficio postale" },
                { en: "shopping centre", it: "centro commerciale" },
                { en: "sports centre", it: "centro sportivo" },
                { en: "supermarket", it: "supermercato" },
                { en: "train station", it: "stazione dei treni" },
                { en: "art gallery", it: "galleria d'arte" },
                { en: "bookshop", it: "libreria" },
                { en: "car park", it: "parcheggio" },
                { en: "chemist's", it: "farmacia" },
                { en: "church", it: "chiesa" },
                { en: "library", it: "biblioteca" },
                { en: "market", it: "mercato" },
                { en: "museum", it: "museo" },
                { en: "restaurant", it: "ristorante" },
                { en: "skatepark", it: "skatepark" },
                { en: "square", it: "piazza" },
                { en: "theatre", it: "teatro" },
                { en: "boat", it: "barca" },
                { en: "bus", it: "bus" },
                { en: "car", it: "macchina" },
                { en: "coach", it: "bus / pullman" },
                { en: "motorbike", it: "moto" },
                { en: "plane", it: "aereo" },
                { en: "train", it: "treno" },
                { en: "scooter", it: "scooter" },
                { en: "underground", it: "metro" }
            ],
            unit3: [
                { en: "charge the battery", it: "caricare il telefono" },
                { en: "chat to friends", it: "scrivere agli amici" },
                { en: "check the weather forecast", it: "guardare il meteo" },
                { en: "download an app", it: "scaricare una app" },
                { en: "get directions", it: "guardare le indicazioni" },
                { en: "listen to music and podcasts", it: "ascoltare musica/podcast" },
                { en: "look up information", it: "guardare informazioni" },
                { en: "make a phone call", it: "fare una chiamata" },
                { en: "post a message / photo / video on social media", it: "postare un messaggio / foto / video sui social media" },
                { en: "set an alarm", it: "impostare una sveglia" },
                { en: "take a photo", it: "fare una foto" },
                { en: "watch a video", it: "guardare un video" },
                { en: "cable", it: "cavo" },
                { en: "keyboard", it: "tastiera" },
                { en: "mouse", it: "mouse" },
                { en: "portable charger", it: "caricatore portatile" },
                { en: "printer", it: "stampante" },
                { en: "screen", it: "schermo" },
                { en: "speakers", it: "casse" },
                { en: "USB key", it: "chiavetta USB" },
                { en: "voice assistant", it: "assistente vocale" },
                { en: "webcam", it: "fotocamera" }
            ],
            unit4: [
                { en: "action film", it: "film d'azione" },
                { en: "animated film", it: "film animato" },
                { en: "comedy", it: "commedia" },
                { en: "fantasy film", it: "film di fantasia" },
                { en: "horror film", it: "film horror" },
                { en: "love story", it: "storia romantica" },
                { en: "musical", it: "musical" },
                { en: "rom-com", it: "commedia romantica" },
                { en: "science-fiction film", it: "film di fantascienza" },
                { en: "superhero film", it: "supereroi" },
                { en: "thriller", it: "thriller" },
                { en: "war film", it: "film di guerra" },
                { en: "cartoon", it: "cartone animato" },
                { en: "chat show", it: "talk show" },
                { en: "documentary", it: "documentario" },
                { en: "drama", it: "drammatico" },
                { en: "quiz show", it: "quiz" },
                { en: "reality show", it: "reality" },
                { en: "sitcom", it: "sitcom" },
                { en: "soap", it: "soap" },
                { en: "sports programme", it: "programma sportivo" },
                { en: "talent show", it: "talent" },
                { en: "the news", it: "tg" },
                { en: "TV series", it: "serie tv" }
            ],
            unit5: [
                { en: "apples", it: "mele" },
                { en: "bananas", it: "banane" },
                { en: "bread", it: "pane" },
                { en: "burgers", it: "hamburger" },
                { en: "carrots", it: "carote" },
                { en: "cheese", it: "formaggio" },
                { en: "chicken", it: "pollo" },
                { en: "chocolate", it: "cioccolato" },
                { en: "eggs", it: "uova" },
                { en: "grapes", it: "uva" },
                { en: "ham", it: "prosciutto" },
                { en: "mayonnaise", it: "maionese" },
                { en: "onions", it: "cipolle" },
                { en: "oranges", it: "arance" },
                { en: "pasta", it: "pasta" },
                { en: "peas", it: "piselli" },
                { en: "potatoes", it: "patate" },
                { en: "rice", it: "riso" },
                { en: "salmon", it: "salmone" },
                { en: "sandwiches", it: "tramezzini" },
                { en: "sausages", it: "salsicce" },
                { en: "tomatoes", it: "pomodori" },
                { en: "biscuits", it: "biscotti" },
                { en: "butter", it: "burro" },
                { en: "cake", it: "torta" },
                { en: "cereal", it: "cereali" },
                { en: "chips", it: "patatine fritte" },
                { en: "crisps", it: "patatine (in busta)" },
                { en: "honey", it: "miele" },
                { en: "ice-cream", it: "gelato" },
                { en: "jam", it: "marmellata" },
                { en: "melon", it: "melone" },
                { en: "mushrooms", it: "funghi" },
                { en: "oil and vinegar", it: "olio e aceto" },
                { en: "salt and pepper", it: "sale e pepe" },
                { en: "strawberries", it: "fragole" },
                { en: "sugar", it: "zucchero" },
                { en: "sweets", it: "dolci" },
                { en: "toast", it: "pane tostato" },
                { en: "tuna", it: "tonno" },
                { en: "yoghurt", it: "yogurt" },
                { en: "cola", it: "coca cola" },
                { en: "milk", it: "latte" },
                { en: "orange juice", it: "succo d'arancia" },
                { en: "water", it: "acqua" },
                { en: "coffee", it: "caffè" },
                { en: "lemonade", it: "gazzosa" },
                { en: "tea", it: "tè" },
                { en: "a bottle of", it: "una bottiglia di" },
                { en: "a bowl of", it: "una ciotola di" },
                { en: "a cup of", it: "una tazza di" },
                { en: "a packet of", it: "un pacchetto di" },
                { en: "a slice of", it: "una fetta di" },
                { en: "a tin of", it: "una lattina di" }
            ]
        };

        const TOTAL_QUESTIONS = 10;
        let selectedUnit = 'all';
        let selectedMode = 'it-en';
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];

        function selectUnit(unit) {
            selectedUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.unit-btn[data-unit="${unit}"]`).classList.add('active');
        }

        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            let activeVocab = [];
            if (selectedUnit === 'all') {
                Object.values(db).forEach(unitArr => activeVocab = activeVocab.concat(unitArr));
            } else {
                activeVocab = [...db[selectedUnit]];
            }

            const shuffled = shuffle(activeVocab);
            
            // Imposta la modalità specifica per ogni domanda (utile per il mix)
            currentQuestions = shuffled.slice(0, TOTAL_QUESTIONS).map(q => {
                let qMode = selectedMode;
                if (selectedMode === 'mixed') {
                    qMode = Math.random() > 0.5 ? 'it-en' : 'en-it';
                }
                return { ...q, mode: qMode };
            });
            
            currentIndex = 0;
            score = 0;
            userAnswers = [];
            
            showScreen('quiz-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            const isItToEn = q.mode === 'it-en';
            
            const promptText = isItToEn ? q.it : q.en;
            const badgeText = isItToEn ? "Traduci in 🇬🇧" : "Traduci in 🇮🇹";
            const placeholder = isItToEn ? "Scrivi in inglese..." : "Scrivi in italiano...";
            
            document.getElementById('question-counter').innerText = `Domanda ${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('direction-badge').innerText = badgeText;
            document.getElementById('question-text').innerText = promptText;
            
            const pct = (currentIndex / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            
            const input = document.getElementById('answer-input');
            input.placeholder = placeholder;
            input.value = '';
            input.focus();
        }

        // Funzione per la pulizia delle stringhe
        function cleanStr(str) {
            // Rimuove parentesi e loro contenuto, e normalizza spazi
            let cleaned = str.toLowerCase().replace(/\([^)]*\)/g, '').replace(/\s+/g, ' ').trim();
            return cleaned;
        }

        function checkMatch(user, correct) {
            const u = cleanStr(user);
            const c = cleanStr(correct);
            
            if (u === c) return true;
            
            // Gestione opzioni con slash (es. "bus / pullman" -> accetta "bus" o "pullman")
            if (c.includes('/')) {
                const parts = c.split('/').map(p => p.trim());
                if (parts.includes(u)) return true;
            }
            
            // Fallback per controllo della stringa originale senza rimozione parentesi
            // Es. Se l'utente scrive "patatine (in busta)" e la risposta era quella.
            const uRaw = user.toLowerCase().replace(/\s+/g, ' ').trim();
            const cRaw = correct.toLowerCase().replace(/\s+/g, ' ').trim();
            if (uRaw === cRaw) return true;

            return false;
        }

        function checkAnswer() {
            const inputVal = document.getElementById('answer-input').value;
            if(inputVal.trim() === '') return; 

            const q = currentQuestions[currentIndex];
            const isItToEn = q.mode === 'it-en';
            
            const expected = isItToEn ? q.en : q.it;
            const prompt = isItToEn ? q.it : q.en;
            
            const isCorrect = checkMatch(inputVal, expected);
            if (isCorrect) score++;

            userAnswers.push({
                mode: q.mode,
                prompt: prompt,
                expected: expected,
                user: inputVal,
                isCorrect: isCorrect
            });

            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(() => {
                showScreen('result-screen');
                buildResults();
            }, 300); 
        }

        function buildResults() {
            const scoreCircle = document.getElementById('score-display');
            scoreCircle.innerText = `${score}/10`;
            
            let msg = "";
            let color = "";
            if (score === 10) { msg = "Perfetto! Eccellente 🏆"; color = "var(--correct)"; }
            else if (score >= 7) { msg = "Ottimo lavoro! 🌟"; color = "var(--primary)"; }
            else if (score >= 5) { msg = "Sufficiente, ma puoi migliorare. 👍"; color = "#f39c12"; }
            else { msg = "C'è da ripassare! 📚"; color = "var(--wrong)"; }
            
            const msgEl = document.getElementById('vote-message');
            msgEl.innerText = msg;
            msgEl.style.color = color;
            scoreCircle.style.background = color;

            const listEl = document.getElementById('results-list');
            listEl.innerHTML = '';

            userAnswers.forEach(ans => {
                const item = document.createElement('div');
                item.className = `result-item ${ans.isCorrect ? 'correct' : 'wrong'}`;
                
                const fPrompt = ans.mode === 'it-en' ? '🇮🇹' : '🇬🇧';
                const fExp = ans.mode === 'it-en' ? '🇬🇧' : '🇮🇹';
                
                let html = `<div class="result-prompt">${fPrompt} ${ans.prompt}</div>`;
                
                if (ans.isCorrect) {
                    html += `<div class="result-expected">✅ ${fExp} ${ans.expected}</div>`;
                } else {
                    html += `
                        <div>
                            <span class="result-err">${ans.user}</span>
                            <span class="result-expected">👉 ${fExp} ${ans.expected}</span>
                        </div>
                    `;
                }
                
                item.innerHTML = html;
                listEl.appendChild(item);
            });
        }

        function resetQuiz() {
            showScreen('start-screen');
        }

        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
